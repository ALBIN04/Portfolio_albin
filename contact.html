    <!-- Contact Section -->
    <section id="contact" class="contact-section">
        <div class="contact-container">
            <h2>Contact Me</h2>
            <p>Have a project in mind or want to connect? Feel free to reach out.</p>

            <form id="contactForm">
                <div class="form-group">
                    <input type="text" id="name" placeholder="Your Name">
                    <small class="error"></small>
                </div>

                <div class="form-group">
                    <input type="email" id="email" placeholder="Your Email">
                    <small class="error"></small>
                </div>

                <div class="form-group">
                    <input type="text" id="subject" placeholder="Subject">
                    <small class="error"></small>
                </div>

                <div class="form-group">
                    <textarea id="message" rows="6" placeholder="Your Message"></textarea>
                    <small class="error"></small>
                </div>

                <button type="submit" class="contact-btn">
                    Send Message
                </button>
            </form>
        </div>
    </section>

    <!-- BackGround -->

    <!-- Light Mode Video -->

    <video autoplay muted loop playsinline class="bg-video light-video">
        <source src="./Contents/mixkit-bubbles-of-water-rising-to-the-surface-186-full-hd.mp4">
    </video>

    <!-- Dark Mode Video -->

    <video autoplay muted loop playsinline class="bg-video dark-video">
        <source src="./Contents/vecteezy_abstract-black-and-white-particle-waving-texture-with_29460830.mp4"
            type="video/mp4">
    </video>


    <script>
        const toggleBtn = document.getElementById("theme-toggle");
        const icon = toggleBtn.querySelector("i");

        if (localStorage.getItem("theme") === "light") {
            document.body.classList.add("light-mode");
            icon.classList.replace("fa-moon", "fa-sun");
        }

        toggleBtn.addEventListener("click", () => {
            document.body.classList.toggle("light-mode");

            if (document.body.classList.contains("light-mode")) {
                icon.classList.replace("fa-moon", "fa-sun");
                localStorage.setItem("theme", "light");
            } else {
                icon.classList.replace("fa-sun", "fa-moon");
                localStorage.setItem("theme", "dark");
            }
        });

        
        const form = document.getElementById("contactForm");

        form.addEventListener("submit", function (e) {
            e.preventDefault();

            const name = document.getElementById("name");
            const email = document.getElementById("email");
            const subject = document.getElementById("subject");
            const message = document.getElementById("message");

            let valid = true;

            document.querySelectorAll(".error").forEach(error => {
                error.textContent = "";
            });

            if (name.value.trim() === "") {
                name.nextElementSibling.textContent = "Name is required";
                valid = false;
            }

            if (email.value.trim() === "") {
                email.nextElementSibling.textContent = "Email is required";
                valid = false;
            } else if (
                !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value)
            ) {
                email.nextElementSibling.textContent = "Enter a valid email";
                valid = false;
            }

            if (subject.value.trim() === "") {
                subject.nextElementSibling.textContent = "Subject is required";
                valid = false;
            }

            if (message.value.trim() === "") {
                message.nextElementSibling.textContent = "Message is required";
                valid = false;
            }

            if (valid) {
                alert("Message sent successfully!");
                form.reset();
            }
        });
    </script>
